<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 Contest</title>
    <style>
        :root {
            --primary-blue: #1a237e;
            --accent-red: #d32f2f;
            --win-bg: rgba(232, 245, 233, 0.95);
            --win-text: #2e7d32;
            --loss-bg: rgba(255, 235, 238, 0.95);
            --loss-text: #c62828;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Updated to a dynamic IPL action background */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?auto=format&fit=crop&q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero h1 {
            font-size: 5rem;
            color: var(--gold);
            text-shadow: 4px 4px 20px rgba(0,0,0,1);
            margin: 0 0 40px 0;
            font-weight: 900;
            text-align: center;
        }

        /* Horizontal Button Container */
        .nav-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-button {
            background: rgba(26, 35, 126, 0.9);
            color: white;
            border: 2px solid var(--gold);
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .nav-button:hover {
            background: var(--gold);
            color: var(--primary-blue);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
        }

        /* Modals */
        .modal {
            display: none; position: fixed; z-index: 1001; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.9);
        }
        .modal-card {
            background-color: white; margin: 3vh auto; width: 95%; max-width: 1000px;
            border-radius: 15px; position: relative; overflow: hidden;
            border-top: 8px solid var(--accent-red); color: #333;
        }
        .leaderboard-bg {
            background: linear-gradient(rgba(255,255,255,0.88), rgba(255,255,255,0.88)), 
                        url('https://i.ibb.co/L5Z5vjS/image-e367be.jpg') no-repeat center center;
            background-size: cover;
        }
        .modal-header { padding: 25px 40px 10px 40px; display: flex; align-items: center; gap: 15px; }
        .modal-header h2 { margin: 0; color: var(--primary-blue); text-transform: uppercase; }
        .modal-body { padding: 10px 40px 30px 40px; max-height: 78vh; overflow-y: auto; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 35px; cursor: pointer; color: #888; z-index: 100; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: rgba(255,255,255,0.9); }
        th { background-color: var(--primary-blue); color: white; padding: 12px; font-size: 0.9rem; }
        td { padding: 10px; border: 1px solid #ddd; text-align: center; font-weight: 700; }
        .name-col { text-align: left; color: var(--primary-blue); }
        .win { background-color: var(--win-bg) !important; color: var(--win-text); }
        .loss { background-color: var(--loss-bg) !important; color: var(--loss-text); }

        /* Rules */
        .rule-item { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 18px; line-height: 1.4; text-align: left; }
        .rule-icon { font-size: 1.5rem; min-width: 35px; }
    </style>
</head>

    <div class="nav-container">
        <button class="nav-button" onclick="showModal('rulesModal')">📜 Contest Rules</button>

        <button class="nav-button" onclick="showModal('leaderboardModal')">📊 Leaderboard</button>

    <div id="rulesModal" class="modal">

            <span class="close" onclick="closeModal('rulesModal')">&times;</span>

    <div id="leaderboardModal" class="modal">

                    </thead>

            </div>
        </div>
    </div>
